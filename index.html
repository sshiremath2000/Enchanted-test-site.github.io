// tweaks-panel.jsx
// Reusable Tweaks shell + form-control helpers.
// Exports (to window): useTweaks, TweaksPanel, TweakSection, TweakRow, TweakSlider,

// don't hand-draw <input type="range">, segmented radios, steppers, etc.
//
// Usage (in an HTML file that loads React + Babel):
//
//   const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
//     "primaryColor": "#D97757",

//     "density": "regular",
//     "dark": false
//   }/*EDITMODE-END*/;
//

//     return (

//         <TweaksPanel>
//           <TweakSection label="Typography" />
//           <TweakSlider label="Font size" value={t.fontSize} min={10} max={32} unit="px"

//           <TweakRadio  label="Density" value={t.density}

//                        onChange={(v) => setTweak('primaryColor', v)} />
//           <TweakColor  label="Palette" value={t.palette}
//                        options={[['#D97757', '#29261b', '#f6f4ef'],
//                                  ['#475569', '#0f172a', '#f1f5f9']]}
//                        onChange={(v) => setTweak('palette', v)} />
//           <TweakToggle label="Dark mode" value={t.dark}
//                        onChange={(v) => setTweak('dark', v)} />
//         </TweaksPanel>

//
// TweakRadio is the segmented control for 2–3 short options (auto-falls-back to
// TweakSelect past ~16/~10 chars per label); reach for TweakSelect directly when
// options are many or long. For color tweaks always curate 3-4 options rather than

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

            background: rgba(193,122,74,0.1);
        }

        .plan-toggle-btn.active {
            background: var(--theme-accent);
            color: #fff;
        }

        .plan-send-enquiry-btn {
            margin-top: 1rem;
            width: 100%;
            padding: 0.7rem 1rem;
            border-radius: 8px;
            border: none;
            background: var(--theme-accent);
            color: #fff;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }

        .plan-send-enquiry-btn:hover { opacity: 0.9; }

        /* Header */
        .home-header {
            text-align: center;
            padding: 2.5rem 1rem 1rem;
            position: relative;
        }

        .home-header-logo {
            position: absolute;
            top: 1.25rem;
            right: -1rem;
            height: 34px;
            width: auto;
        }
        @media (max-width: 700px) {
            .home-header-logo { position: static; display: block; margin: 0 auto 0.75rem; height: 28px; right: auto; }
        }

        .home-header h1 {
            font-size: 2.5rem;
            font-weight: 600;
            color: var(--theme-ink);
            letter-spacing: -0.5px;
            margin-bottom: 0.75rem;
        }

        .header-rule {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
        }

        .rule-line {
            flex: 1;
            max-width: 120px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(193,122,74,0.4), transparent);
        }

        .header-subtext {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            color: #C03B14;
            font-weight: 600;
        }

        /* Tapestry Banner */
        .tapestry-container {
            position: relative;
            border: 1px solid rgba(193,122,74,0.18);
            border-radius: 10px;
            background: rgba(234,213,193,0.2);
            height: 130px;
            margin: 1.5rem 0;
            overflow: hidden;
            perspective: 1200px;
            transform-style: preserve-3d;
        }

        /* Mood label */
        .mood-label {
            text-align: center;
            margin: 1.25rem 0 1rem;
        }

        .mood-label h3 {
            font-size: 1.125rem;
            font-weight: 500;
            color: #C03B14;
            letter-spacing: 0.02em;
            margin-bottom: 0.5rem;
        }

        .mood-rule {
            width: 48px;
            height: 2px;
            background: var(--theme-accent);
            margin: 0 auto;
        }

        /* Bento category grid */
        .categories-bento {
            display: grid;
            grid-template-columns: 1.5fr 1.5fr 1.1fr;
            grid-template-rows: 360px 300px;
            gap: 14px;
            margin-bottom: 3rem;
        }

        .bento-temples {
            grid-column: 3;
            grid-row: 1 / 3;
        }

        .bento-bottom-left {
            grid-column: 1;
            grid-row: 2;
            display: flex;
            gap: 14px;
        }

        .bento-bottom-left .category-card {
            flex: 1;
            height: 100%;
            min-height: unset;
            max-height: unset;
        }

        .bento-palace {
            grid-column: 2;
            grid-row: 2;
        }

        .bento-temples,
        .bento-palace {
            height: 100%;
        }

        .bento-temples .category-card,
        .bento-palace .category-card {
            height: 100%;
            min-height: unset;
            max-height: unset;
        }

        @media (max-width: 900px) {
            .categories-bento {
                grid-template-columns: 1fr 1fr;
                grid-template-rows: 260px 260px 260px;
            }
            .bento-temples { grid-column: 1 / 3; grid-row: 2; }
            .bento-bottom-left { grid-column: 1; grid-row: 3; }
            .bento-palace { grid-column: 2; grid-row: 3; }
        }
        @media (max-width: 540px) {
            .categories-bento { grid-template-columns: 1fr; grid-template-rows: repeat(6, 280px); }
            .bento-temples { grid-column: 1; grid-row: 3; }
            .bento-bottom-left { grid-column: 1; grid-row: 4; flex-direction: column; }
            .bento-palace { grid-column: 1; grid-row: 5; }
        }

        .category-card {
            width: 100%;
            cursor: pointer;
            perspective: 1000px;
            position: relative;
            user-select: none;
        }

        /* Card faces */
        .card-face {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border-radius: 18px;
            overflow: hidden;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        /* Front */
        .card-front { border: 1px solid rgba(193,122,74,0.15); }

        .card-front img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.7s ease;
        }

        .category-card:hover .card-front img { transform: scale(1.05); }

        .card-front::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 30%, rgba(0,0,0,0.88) 100%);
            z-index: 2;
        }

        .inner-border {
            position: absolute;
            inset: 10px;
            border: 1px solid rgba(193,122,74,0.12);
            border-radius: 10px;
            z-index: 3;
            pointer-events: none;
            transition: border-color 0.3s ease;
        }

        .category-card:hover .inner-border { border-color: rgba(193,122,74,0.45); }

        .card-front-content {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            z-index: 4;
            padding: 1.5rem;
            color: white;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .cf-label {
            font-size: 0.62rem;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: #d4a574;
            font-weight: 600;
        }

        .cf-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: white;
            transition: color 0.3s ease;
        }

        .category-card:hover .cf-title { color: #d4a574; }

        .cf-count {
            font-size: 0.72rem;
            color: #d4a574;
            font-weight: 500;
            margin-top: 4px;
        }

        /* Back */
        .card-back {
            background: #0d2c3f;
            border: 1px solid rgba(212,165,116,0.35);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            text-align: center;
            transform: rotateY(180deg);
        }

        .cb-spinner {
            width: 30px; height: 30px;
            border: 2px solid #d4a574;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 3s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%,100% { opacity:0.5; } 50% { opacity:1; } }

        .cb-label {
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: #d4a574;
            font-weight: 500;
        }

        .cb-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
            letter-spacing: 0.08em;
        }

        .cb-rule {
            width: 40px; height: 1px;
            background: rgba(212,165,116,0.4);
        }

        .cb-status {
            font-size: 0.65rem;
            color: rgba(212,165,116,0.55);
            letter-spacing: 0.08em;
            animation: pulse 2s infinite;
        }

        /* Nav bar */
        .nav-bar {
            display: flex;
            justify-content: space-between;
            padding: 1rem 0;
            border-bottom: 1px solid var(--theme-border);
            margin-bottom: 1.5rem;
        }

        .nav-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 1.25rem;
            border: 1px solid rgba(193,122,74,0.3);
            border-radius: 6px;
            background: rgba(245,237,224,0.5);
            color: var(--theme-ink);
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            transition: all 0.3s ease;
        }

        .nav-btn:hover {
            background: rgba(193,122,74,0.1);
            border-color: var(--theme-accent);
            color: var(--theme-accent);
        }

        /* Nav-bar icon buttons: compact icon spans replace the old full-text labels. */
        .nav-full { display: none; }
        .nav-compact { display: inline-flex; align-items: center; }
        .nav-btn { padding: 0.6rem 0.85rem; }
        .nav-btn-home-icon { width: 16px; height: 16px; }

        /* Inline "add to plan" +/✓ button next to the temple title on mobile,
           replacing the nav-bar pill (which stays as-is on desktop). */
        .ta-title-row { display: flex; align-items: flex-start; gap: 0.6rem; }
        #plan-toggle-btn { display: none; }
        .plan-add-inline {
            display: flex; align-items: center; justify-content: center;
            width: 34px; height: 34px; min-width: 34px; margin-top: 0.6rem;
            border-radius: 50%; border: 1px solid var(--theme-accent);
            background: transparent; color: var(--theme-accent);
            font-size: 18px; font-weight: 600; cursor: pointer; line-height: 1;
            transition: background 0.2s ease, color 0.2s ease;
        }
        .plan-add-inline.active {
            background: var(--theme-accent); color: #fff;
        }

        /* Category view header */
        .cat-header {
            text-align: center;
            margin: 1.5rem 0 2rem;
        }

        .cat-header-tag {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: var(--theme-accent);
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .cat-header h2 {
            font-size: 2rem;
            color: var(--theme-ink);
            font-weight: 600;
            position: relative;
            padding-bottom: 0.75rem;
            margin-bottom: 0.75rem;
        }

        .cat-header h2::after {
            content: '';
            position: absolute;
            bottom: 0; left: 50%;
            transform: translateX(-50%);
            width: 40px; height: 2px;
            background: var(--theme-accent);
        }

        .cat-header p {
            color: var(--theme-body);
            font-size: 0.9rem;
            max-width: 580px;
            margin: 0 auto;
        }

        /* Places grid */
        .places-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.25rem;
            margin-bottom: 3rem;
        }

        .place-card {
            display: flex;
            border: 1px solid #d4a574;
            border-radius: 10px;
            overflow: hidden;
            background: var(--theme-surface);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .place-card:hover {
            border-color: #d4a574;
            box-shadow: 0 8px 24px rgba(193,122,74,0.12);
            transform: translateY(-3px);
        }

        .place-img {
            width: 32%;
            min-width: 100px;
            min-height: 150px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .place-img img {
            width: 100%; height: 100%;
            object-fit: cover;
            transition: transform 0.7s ease;
        }

        .place-card:hover .place-img img { transform: scale(1.1); }

        .place-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 1rem;
        }

        .place-loc {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--theme-accent);
            font-weight: 600;
            margin-bottom: 0.35rem;
        }

        .place-name {
            font-size: 1rem;
            font-weight: 600;
            color: var(--theme-accent);
            margin-bottom: 0.4rem;
            transition: color 0.3s ease;
        }

        .place-card:hover .place-name { color: var(--theme-accent); }

        .place-desc {
            font-size: 0.82rem;
            color: var(--theme-body);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .place-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 0.6rem;
            margin-top: 0.5rem;
            border-top: 1px solid var(--theme-border);
            font-size: 0.7rem;
            color: var(--theme-accent);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 500;
        }

        .place-arrow { transition: transform 0.3s ease; }
        .place-card:hover .place-arrow { transform: translateX(4px); }

        /* Detail view */
        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
            margin-bottom: 3rem;
        }

        @media (max-width: 768px) { .detail-grid { grid-template-columns: 1fr; } }

        .detail-sidebar { display: flex; flex-direction: column; gap: 1rem; }

        .detail-img {
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--theme-border);
        }

        .detail-img img { width: 100%; display: block; object-fit: cover; }

        .info-box {
            border: 1px solid var(--theme-border);
            border-radius: 8px;
            padding: 0.9rem;
            background: rgba(245,237,224,0.35);
        }

        .info-box-label {
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--theme-accent);
            font-weight: 600;
            margin-bottom: 0.4rem;
        }

        .info-box-content { font-size: 0.82rem; color: var(--theme-body); line-height: 1.4; }

        .detail-content { display: flex; flex-direction: column; gap: 1.5rem; }

        .detail-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.4rem 0.9rem;
            background: rgba(193,122,74,0.1);
            border: 1px solid #d4a574;
            border-radius: 5px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--theme-accent);
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .detail-content h1 {
            font-size: 1.85rem;
            font-weight: 600;
            color: var(--theme-ink);
        }

        .detail-rule {
            width: 40px; height: 2px;
            background: var(--theme-accent);
            margin-top: 0.5rem;
        }

        .detail-section { border-top: 1px solid var(--theme-border); padding-top: 1.25rem; }

        .detail-section h3 {
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--theme-accent);
            font-weight: 600;
            margin-bottom: 0.75rem;
        }

        .detail-section p { color: var(--theme-body); line-height: 1.65; font-size: 0.9rem; }

        /* Hero title / subtitle tweak overrides */
        .home-header h1 {
            font-family: var(--hero-title-font) !important;
            letter-spacing: var(--hero-title-spacing) !important;
        }
        .header-subtext {
            color: var(--hero-subtitle-color) !important;
            font-weight: var(--hero-subtitle-weight) !important;
            text-transform: var(--hero-subtitle-transform) !important;
            letter-spacing: var(--hero-subtitle-tracking) !important;
        }

        /* Body-copy tweak overrides — beats inline styles set in JS templates */
        .detail-section p,
        .detail-content p,
        .info-box-content,
        .tv-carousel .tv-slide {
            color: var(--body-copy-color) !important;
            font-weight: var(--body-copy-weight) !important;
            font-size: var(--body-copy-size) !important;
            line-height: var(--body-copy-lh) !important;
        }

        .tv-section {
            border-top: none !important;
            background: color-mix(in srgb, var(--theme-accent) 8%, transparent);
            border: 1px solid color-mix(in srgb, var(--theme-accent) 22%, transparent);
            border-radius: 10px;
            padding: 1.5rem 1.5rem 1.25rem 3.25rem;
            position: relative;
            margin-top: 1.25rem;
        }
        .tv-section::before {
            content: "“";
            position: absolute;
            top: 0.55rem;
            left: 1rem;
            font-size: 2.75rem;
            line-height: 1;
            font-family: Georgia, "Times New Roman", serif;
            color: var(--theme-accent);
            opacity: 0.55;
        }
        .tv-section::after {
            content: "”";
            position: absolute;
            bottom: 0.15rem;
            right: 1.1rem;
            font-size: 2.75rem;
            line-height: 1;
            font-family: Georgia, "Times New Roman", serif;
            color: var(--theme-accent);
            opacity: 0.55;
        }
        .tv-section h3 { color: var(--theme-accent); }
        .tv-carousel { position: relative; }
        .tv-carousel .tv-slide {
            margin: 0;
            position: absolute;
            top: 0; left: 0; right: 0;
            opacity: 0;
            transition: opacity 1.6s ease-in-out;
        }
        .tv-carousel .tv-slide.tv-active { opacity: 1; }

        .highlights-list {
            list-style: none;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 0.75rem;
        }

        .hl-item {
            display: flex;
            align-items: flex-start;
            gap: 0.65rem;
            padding: 0.85rem;
            border: 1px solid var(--theme-border);
            border-radius: 6px;
            background: rgba(245,237,224,0.3);
            transition: border-color 0.3s ease;
        }

        .hl-item:hover { border-color: #d4a574; }

        .hl-icon {
            flex-shrink: 0;
            width: 18px; height: 18px;
            border-radius: 50%;
            background: rgba(193,122,74,0.2);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.65rem;
            color: var(--theme-accent);
            font-weight: 700;
        }

        .hl-text { font-size: 0.82rem; color: var(--theme-body); line-height: 1.35; }

        .detail-back-btn {
            display: inline-flex;
            align-items: center;
            padding: 0.65rem 1.25rem;
            border: 1px solid #d4a574;
            border-radius: 6px;
            background: rgba(245,237,224,0.5);
            color: var(--theme-ink);
            cursor: pointer;
            font-size: 0.78rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            transition: all 0.3s ease;
        }

        .detail-back-btn:hover { background: rgba(193,122,74,0.1); border-color: var(--theme-accent); color: var(--theme-accent); }

        /* Page transitions */
        #app-content {
            transition: opacity 0.4s cubic-bezier(0.16,1,0.3,1), transform 0.4s cubic-bezier(0.16,1,0.3,1), filter 0.4s;
        }

        #app-content.out {
            opacity: 0;
            transform: scale(0.96) translateY(-12px);
            filter: blur(4px);
        }

        /* Responsive place cards */
        @media (max-width: 600px) {
            .place-card { flex-direction: column; }
            .place-img { width: 100%; height: 180px; }
        }

        /* Info cards (About / Contact) */
        .info-cards-section { margin: 0 0 3rem; }
        .info-cards-label {
            text-align: center;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: rgba(193,122,74,0.55);
            margin-bottom: 1rem;
        }
        .info-cards-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }
        @media (max-width: 540px) { .info-cards-grid { grid-template-columns: 1fr; } }
        .info-card {
            height: 150px;
            cursor: pointer;
            perspective: 1000px;
            user-select: none;
        }
        .info-card .card-face { border-radius: 14px; }
        .info-card .card-front {
            background: linear-gradient(135deg, rgba(234,213,193,0.55) 0%, rgba(193,122,74,0.12) 100%);
            border: 1px solid rgba(193,122,74,0.22);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .info-card .card-front::after { display: none; }
        .ic-icon {
            width: 42px; height: 42px;
            border-radius: 50%;
            background: rgba(193,122,74,0.14);
            display: flex; align-items: center; justify-content: center;
            color: var(--theme-accent);
        }
        .ic-title { font-size: 0.95rem; font-weight: 600; color: var(--theme-ink); letter-spacing: 0.02em; }
        .ic-hint  { font-size: 0.65rem; color: rgba(61,36,21,0.45); letter-spacing: 0.12em; text-transform: uppercase; }
        .info-card .card-back {
            background: linear-gradient(135deg, var(--theme-deep) 0%, var(--theme-grad-end) 100%);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 0.4rem;
        }

        /* ── Temple Atlas ── */
        .ta-layout { display:grid; grid-template-columns:260px 1fr; gap:28px; align-items:start; margin-top:1.5rem; }
        @media(max-width:800px){ .ta-layout{ grid-template-columns:1fr; } .ta-detail-header { order:-1; } .ta-sidebar { order:1; } main { order:2; } }
        .ta-hero { display:grid; grid-template-columns:1fr 2fr; gap:2rem; align-items:start; margin-bottom:1.5rem; }
        @media(max-width:800px){ .ta-hero{ grid-template-columns:1fr; } .ta-hero-info{ order:-1; } }
        .ta-sidebar { position:sticky; top:80px; background:var(--theme-surface); border:1px solid var(--theme-border); border-radius:6px; padding:20px 18px 24px; box-shadow:0 1px 2px rgba(61,36,21,0.04),0 8px 24px -12px rgba(61,36,21,0.14); }
        .ta-panel-title { font-size:1rem; font-weight:700; color:var(--theme-ink); display:flex; justify-content:space-between; align-items:center; margin-bottom:2px; }
        .ta-reset { font-size:11px; font-weight:600; color:var(--theme-accent); background:none; border:none; cursor:pointer; text-decoration:underline; text-underline-offset:2px; padding:0; }
        .ta-panel-sub { font-size:11.5px; color:var(--theme-muted); margin-bottom:16px; }
        .ta-field { margin-bottom:16px; }
        .ta-field label { display:block; font-size:10.5px; font-weight:700; letter-spacing:0.09em; text-transform:uppercase; color:var(--theme-muted); margin-bottom:6px; }

    /* ── MY PLAN (in-memory only; resets on refresh/exit) ───── */
    let myPlan = [];

    function attrSafe(s) { return String(s == null ? '' : s).replace(/\\/g, '\\\\').replace(/'/g, "\\'"); }

    function isInPlan(name) { return myPlan.some(p => p.name === name); }

    function handleTempleCardPlanToggle(btn, name, city, state) {
        handleTogglePlan(name, city, state);
        const added = isInPlan(name);
        btn.classList.toggle('active', added);
        btn.textContent = added ? '−' : '+';
        btn.title = added ? 'Remove from My Plan' : 'Add to My Plan';
    }

    function handleTogglePlan(name, city, state) {
        const idx = myPlan.findIndex(p => p.name === name);
        if (idx > -1) myPlan.splice(idx, 1);
        else myPlan.push({ name, city, state });
        renderPlanPanel();
        const btn = document.getElementById('plan-toggle-btn');
        const added = isInPlan(name);
        if (btn) {
            btn.classList.toggle('active', added);
            btn.innerHTML = added ? '− Added to My Plan' : '+ Add to My Plan';
        }
        const inlineBtn = document.getElementById('plan-toggle-inline');
        if (inlineBtn) {
            inlineBtn.classList.toggle('active', added);
            inlineBtn.textContent = added ? '−' : '+';
            inlineBtn.setAttribute('aria-label', added ? 'Remove from My Plan' : 'Add to My Plan');
        }
    }

    function removeFromPlan(name) {
        myPlan = myPlan.filter(p => p.name !== name);
        renderPlanPanel();
        if (nav.view === 'temple-detail' && nav.placeId === name) {
            const btn = document.getElementById('plan-toggle-btn');
            if (btn) { btn.classList.remove('active'); btn.innerHTML = '+ Add to My Plan'; }
            const inlineBtn = document.getElementById('plan-toggle-inline');
            if (inlineBtn) { inlineBtn.classList.remove('active'); inlineBtn.textContent = '+'; inlineBtn.setAttribute('aria-label', 'Add to My Plan'); }
        }
    }

    let pendingEnquiryMessage = null;
    let planExpanded = false;
    let planAutoCollapseTimer = null;

    function sendEnquiryFromPlan() {
        const list = myPlan.map(p => `• ${p.name} (${p.city}, ${p.state})`).join('\n');
        pendingEnquiryMessage = `I am interested to visit the below destinations:\n\n${list}\n\nPlease help me plan this trip.`;
        navigateTo('contact', null, null);
    }

    function expandPlanPanel() {
        if (myPlan.length === 0) return;
        planExpanded = true;
        document.body.classList.add('plan-open');
        clearTimeout(planAutoCollapseTimer);
        planAutoCollapseTimer = setTimeout(() => {
            planExpanded = false;
            document.body.classList.remove('plan-open');
            updatePlanMini();
        }, 2000);
        updatePlanMini();
    }

    function updatePlanMini() {
        const mini = document.getElementById('plan-mini');
        const fabBadge = document.getElementById('mobile-fab-badge');
        const fabPlanCount = document.getElementById('mobile-fab-plan-count');
        if (myPlan.length === 0) {
            if (mini) mini.classList.remove('visible');
            if (fabBadge) { fabBadge.textContent = '0'; fabBadge.classList.remove('visible'); }
            if (fabPlanCount) fabPlanCount.textContent = '0';
            return;
        }
        if (mini) {
            mini.querySelector('.plan-mini-count').textContent = myPlan.length;
            mini.classList.toggle('visible', !planExpanded);
        }
        if (fabBadge) { fabBadge.textContent = myPlan.length; fabBadge.classList.add('visible'); }
        if (fabPlanCount) fabPlanCount.textContent = myPlan.length;
    }

    /* Mobile FAB toggle — collapses the social icons + My Plan pill into one
       button on small screens (see .mobile-fab CSS). Desktop keeps its
       always-visible .social-float / .plan-mini, untouched. */
    function toggleMobileFab(force) {
        const fab = document.getElementById('mobile-fab');
        const backdrop = document.getElementById('mobile-fab-backdrop');
        const btn = document.getElementById('mobile-fab-toggle');
        if (!fab) return;
        const open = typeof force === 'boolean' ? force : !fab.classList.contains('open');
        fab.classList.toggle('open', open);
        if (backdrop) backdrop.classList.toggle('open', open);
        if (btn) btn.setAttribute('aria-expanded', open ? 'true' : 'false');
    }
    function closeMobileFab() { toggleMobileFab(false); }

    function renderPlanPanel() {
        const panel = document.getElementById('plan-panel');
        if (!panel) return;
        if (myPlan.length === 0) {
            panel.innerHTML = '';
            planExpanded = false;
            clearTimeout(planAutoCollapseTimer);
            document.body.classList.remove('plan-open');
            updatePlanMini();
            return;
        }
        panel.innerHTML = `
            <div class="plan-panel-body">
                <div class="plan-panel-header">

                            </div>

        expandPlanPanel();

    /* ── ROUTING ────────────────────────────────────────────── */
    let nav = { view: 'home', categoryId: null, placeId: null };
    let historyStack = [];

    function navigateTo(view, categoryId, placeId) {
        historyStack.push({ ...nav });
        transitionTo({ view, categoryId, placeId });
    }

    function goBack() {
        transitionTo(historyStack.length > 0 ? historyStack.pop() : { view: 'home', categoryId: null, placeId: null });
    }

    function goHome() {
        historyStack = [];
        transitionTo({ view: 'home', categoryId: null, placeId: null });
    }

    function transitionTo(nextNav) {
        const el = document.getElementById('app-content');
        el.classList.add('out');
        setTimeout(() => {
            nav = nextNav;
            el.innerHTML = nav.view === 'home'          ? renderHome() :
                           nav.view === 'temple-map'   ? renderTempleMap() :
                           nav.view === 'temple-detail'? renderTempleDetail() :
                           nav.view === 'category'     ? renderCategory() :
                           nav.view === 'about'        ? renderAbout() :
                           nav.view === 'contact'      ? renderContact() : renderDetail();
            el.classList.remove('out');
            if (nav.view === 'home') {
                loadTapestry();
                startSlideshows();
            } else if (nav.view === 'temple-map') {
                initTempleMap();
            } else if (nav.view === 'category' && nav.categoryId === 'temples') {
                initTempleAtlas();
            } else if (nav.view === 'temple-detail' || nav.view === 'detail') {
                initTravelerVoiceCarousels();
            }
        }, 380);
    }

    function handleCategorySelect(id) {
        const card = document.getElementById('card-' + id);
        if (card) card.classList.add('flipped');
        setTimeout(() => {
            if (id === 'temples') navigateTo('temple-map', id, null);
            else navigateTo('category', id, null);
        }, 820);
    }

    function handlePlaceSelect(id) { navigateTo('detail', nav.categoryId, id); }

    function handleInfoCardSelect(id) {
        const card = document.getElementById('card-' + id);
        if (card) card.classList.add('flipped');
        setTimeout(() => navigateTo(id, null, null), 820);
    }

    /* ── TAPESTRY ANIMATION ─────────────────────────────────── */
    function loadTapestry() {
        const c = document.getElementById('tapestry');
        if (!c) return;
        c.innerHTML = '';
        WELCOMES.forEach(w => {
            const d = document.createElement('div');
            d.style.cssText = `position:absolute;top:${w.top};left:${w.left};transform:translate(-50%,-50%);`;
            const s = document.createElement('span');
            s.className = 'fly-span';
            Object.assign(s.style, {
                color: w.color,
                animationDelay: w.delay + 's',
                animationDuration: w.duration + 's'
            });
            s.textContent = w.word;
            d.appendChild(s);
            c.appendChild(d);
        });
    }

    /* ── TEMPLE ATLAS HELPERS ──────────────────────────────── */
    function taPopClass(p){ return p.replace(/\s*\/\s*/g,'-').replace(/\s+/g,'-'); }
    function taStateLabelPos(pathD){
        if(!pathD) return null;
        const nums = pathD.match(/-?\d+\.?\d*/g);
        if(!nums||nums.length<2) return null;
        let xs=[],ys=[];
        for(let i=0;i<nums.length-1;i+=2){ xs.push(+nums[i]); ys.push(+nums[i+1]); }
        const mnX=Math.min(...xs),mxX=Math.max(...xs),mnY=Math.min(...ys);
        return [(mnX+mxX)/2, mnY-6];
    }
    function taProjectLngLat(lng,lat){
        const p=MAP_DATA.project;
        const x=(lng-p.LNG_MIN)*p.lng_scale;
        const y=(p.LAT_MAX-lat);
        const sx=p.pad+(x-p.x0)*p.scale;
        const sy=p.pad+(y-p.y0)*p.scale;
        return [sx,sy];
    }
    function taBuildMap(t){
        const stKey=t.state==='Jammu & Kashmir'?'Jammu and Kashmir':t.state;
        const stPath=(MAP_DATA.states&&MAP_DATA.states[stKey])||'';
        const [px,py]=taProjectLngLat(t.lng,t.lat);
        const lp=taStateLabelPos(stPath)||[px,py-14];
        return `<div class="td-map-wrap">
          <svg viewBox="${MAP_DATA.viewBox}" preserveAspectRatio="xMidYMid meet">
            <path fill="#ece3d2" stroke="#c9b894" stroke-width="0.6" d="${MAP_DATA.outline}"/>
            ${stPath?`<path fill="rgba(193,122,74,0.28)" stroke="var(--theme-accent)" stroke-width="1.2" d="${stPath}"/>`:""}  
            ${stPath?`<text font-family="Inter,sans-serif" font-size="9" font-weight="700" fill="var(--theme-accent)" text-anchor="middle" x="${lp[0]}" y="${lp[1]}">${t.state.toUpperCase()}</text>`:""}
            <circle fill="var(--theme-accent)" fill-opacity="0.3" cx="${px}" cy="${py}" r="10">
              <animate attributeName="r" values="6;14;6" dur="2.4s" repeatCount="indefinite"/>
              <animate attributeName="fill-opacity" values="0.4;0.05;0.4" dur="2.4s" repeatCount="indefinite"/>
            </circle>
            <circle fill="var(--theme-accent)" stroke="white" stroke-width="1.5" cx="${px}" cy="${py}" r="5"/>
          </svg>
          <div class="td-map-caption">
            <span><span class="td-state-name">${t.state}</span> &nbsp;·&nbsp; ${t.city}</span>
            <span style="font-size:10px;">${t.lat.toFixed(2)}°N, ${t.lng.toFixed(2)}°E</span>
          </div>
        </div>`;
    }

    /* Compact map-pin icon used in place of the "MAP" text nav button on mobile. */
    const MAP_ICON = '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:block"><path d="M20.5 10c0 6-8.5 12-8.5 12s-8.5-6-8.5-12a8.5 8.5 0 0 1 17 0Z"/><circle cx="12" cy="10" r="3"/></svg>';

    /* ── India state tiles: approximate relative positions (% of a tall frame),
       not to map scale — used to build the state-picker before the temple list ── */
    const MAP_STATE_ALIAS = { 'Jammu and Kashmir': 'Jammu & Kashmir' };

    /* ── RENDER: TEMPLE MAP (state picker, built from the same MAP_DATA
       outlines used on temple-detail mini-maps) ─────────────────────── */
    function renderTempleMap() {
        const cat = categories.find(c => c.id === 'temples');
        const activeStates = new Set(TEMPLE_DATA.map(t => t.state));
        const stateNames = Object.keys(MAP_DATA.states).sort();
        const groups = stateNames.map(mapName => {
            const d = MAP_DATA.states[mapName];
            const templeName = MAP_STATE_ALIAS[mapName] || mapName;
            const isActive = activeStates.has(templeName);
            const count = isActive ? TEMPLE_DATA.filter(t => t.state === templeName).length : 0;
            const lp = taStateLabelPos(d) || [300, 340];
            const clampedX = Math.min(Math.max(lp[0], 40), 560);
            const clampedY = Math.min(Math.max(lp[1] - 6, 16), 670);
            const safeName = templeName.replace(/'/g, "\\'");
            const labelText = templeName.toUpperCase().replace(/&/g, '&amp;').replace(/"/g, '&quot;');
            return `<g class="im-state-g${isActive ? ' active' : ''}" data-lx="${clampedX}" data-ly="${clampedY}" data-label="${labelText}" onmouseenter="showStateLabel(this)" onmouseleave="hideStateLabel()" ${isActive ? `onclick="handleStateSelect(this,'${safeName}')"` : `onclick="showStateLabel(this)"`}>
                <path class="im-state" d="${d}"/>
                <path class="im-state-hit" d="${d}"/>
            </g>`;
        }).join('');

        const circuitSet = new Set();

    function initTempleAtlas(){
        const stateFilter = nav.stateFilter || null;
        const circuitFilter = nav.circuitFilter || null;

        const enteredViaState = !!stateFilter && !circuitFilter;
        const unexploredList = enteredViaState
            ? TEMPLE_DATA.filter(t => t.popularity && t.popularity !== 'Mega Popular' && t.state === stateFilter)
            : [];
        const showUnexplored = enteredViaState && unexploredList.length > 0;
        const unexploredNames = new Set(unexploredList.map(t => t.name));

        let list = TEMPLE_DATA;
        if (stateFilter) list = list.filter(t => t.state === stateFilter);
        if (circuitFilter) list = list.filter(t => t.circuit && t.circuit.split(';').map(s => s.trim()).includes(circuitFilter));
        if (showUnexplored) list = list.filter(t => !unexploredNames.has(t.name));
        document.getElementById('ta-cards').innerHTML = list.length
            ? list.map(renderTempleCard).join('')
            : `<p style="font-size:14px;color:var(--theme-muted);grid-column:1/-1;text-align:center;padding:2rem 0;">No catalogued temples match this filter.</p>`;

        const unexploredEl = document.getElementById('ta-cards-unexplored');
        const unexploredSection = document.querySelector('.ta-unexplored-section');
        if (unexploredEl && unexploredSection) {
            if (showUnexplored) {
                unexploredSection.style.display = '';
                unexploredEl.innerHTML = unexploredList.map(t => renderTempleCard(t, { badge: t.popularity, variant: 'unexplored' })).join('');

                unexploredEl.innerHTML = '';
            }
        }

    function renderTravelerVoices(raw){
        if(!raw) return '';
        const items = String(raw).split(/\s*\|\s*/).map(s=>s.trim()).filter(Boolean);
        if(items.length===0) return '';
        const heading = `<h3 style="font-size:1.125rem;font-weight:600;color:var(--theme-ink);line-height:1.4;letter-spacing:0.02em;">Traveler Voices</h3>`;
        if(items.length===1){
            return `<div class="detail-section tv-section">${heading}<p style="font-size:15px;color:var(--theme-body);line-height:1.65;font-style:italic;">${items[0]}</p></div>`;
        }
        const slides = items.map((q,i)=>`<p class="tv-slide${i===0?' tv-active':''}" style="font-size:15px;color:var(--theme-body);line-height:1.65;font-style:italic;">${q}</p>`).join('');
        return `<div class="detail-section tv-section">${heading}<div class="tv-carousel">${slides}</div></div>`;
    }

    window.__tvTimers = window.__tvTimers || [];
    function initTravelerVoiceCarousels(){
        window.__tvTimers.forEach(id=>clearInterval(id));
        window.__tvTimers = [];
        document.querySelectorAll('.tv-carousel').forEach(carousel=>{
            const slides = carousel.querySelectorAll('.tv-slide');
            if(slides.length === 0) return;
            let maxH = 0;
            slides.forEach(s=>{ maxH = Math.max(maxH, s.scrollHeight); });
            carousel.style.height = maxH + 'px';
            if(slides.length <= 1) return;
            let idx = [...slides].findIndex(s=>s.classList.contains('tv-active'));
            if(idx < 0) idx = 0;
            const timer = setInterval(()=>{
                const next = (idx + 1) % slides.length;
                slides[idx].classList.remove('tv-active');
                slides[next].classList.add('tv-active');
                idx = next;
            }, 5000);
            window.__tvTimers.push(timer);
        });
    }

    window.slideshowIntervals = {};

    function startSlideshows() {
        Object.keys(window.imageSlideshows).forEach(categoryId => {
            const images = window.imageSlideshows[categoryId];
            const card = document.querySelector(`[data-card-id="${categoryId}"]`);
            if (!card) return;

            const layers = card.querySelectorAll('.slideshow-image');
            if (!layers || layers.length < 2 || images.length < 2) return;

            // Preload all images
            images.forEach(imgUrl => {
                const preloader = new Image();
                preloader.referrerPolicy = 'no-referrer';
                preloader.src = imgUrl;
            });

            let activeLayerIndex = 0;
            let currentImageIndex = 0;

            function rotateImage() {
                const nextImageIndex = (currentImageIndex + 1) % images.length;
                const activeLayer = layers[activeLayerIndex];
                const nextLayer = layers[1 - activeLayerIndex];

                // Set initial transform for next image (zoomed in, ready to zoom out)
                nextLayer.style.transform = 'scale(2)';
                nextLayer.src = images[nextImageIndex];
                void nextLayer.offsetWidth;

                // Apply zoom-out to current image
                activeLayer.classList.add('active', 'zoom-out');

                // After 5 seconds (when zoom-out completes), start fade-out
                setTimeout(() => {
                    activeLayer.classList.add('fade-out');
                }, 5000);

                // With 1 second delay after fade starts (1.2s total), fade in next image and start its zoom-out
                setTimeout(() => {
                    nextLayer.classList.add('active', 'fade-in-zoom');
                    activeLayer.classList.remove('active', 'zoom-out');
                }, 6200);

                // Clean up after fade completes
                setTimeout(() => {
                    activeLayer.classList.remove('fade-out');
                    nextLayer.classList.remove('fade-in-zoom');
                    nextLayer.style.transform = '';
                }, 7700);

                activeLayerIndex = 1 - activeLayerIndex;
                currentImageIndex = nextImageIndex;
            }

            // Initialize first image immediately
            const firstLayer = layers[0];
            firstLayer.src = images[0];
            firstLayer.style.transform = 'scale(2)';
            void firstLayer.offsetWidth;
            firstLayer.classList.add('active', 'zoom-out');

            // Start rotation cycle after first animation completes (9s total cycle)
            window.slideshowIntervals[categoryId] = setTimeout(() => {
                rotateImage();
                window.slideshowIntervals[categoryId] = setInterval(rotateImage, 7500);
            }, 9000);
        });
    }

    <!-- Font Size Toolbox for About Page -->
    <script type="text/babel">
        window.FontSizeToolbox = function() {
            const [fontSize, setFontSize] = React.useState(1);

            React.useEffect(() => {
                // Apply font size multiplier to all text elements on About page
                const scale = 1 + (fontSize - 1) * 0.3; // Smooth scaling
                
                document.querySelectorAll('.detail-grid h3, .detail-section h3, .detail-content h1, .detail-section p, .info-box-content, .cat-header h2, .cat-header p').forEach(el => {
                    el.style.fontSize = (parseFloat(window.getComputedStyle(el).fontSize) * (scale / 1)) + 'px';
                });
            }, [fontSize]);

            // Show toolbox only on About page
            const currentView = window.currentView;
            if (currentView !== 'about') return null;

            return (
                <div className="toolbox-panel">
                    <div className="toolbox-title">Font Size Control</div>
                    <div className="toolbox-control">
                        <div className="toolbox-label">Body Text</div>
                        <input 
                            type="range" 
                            className="toolbox-slider" 
                            min="0.8" 
                            max="1.5" 
                            step="0.05" 
                            value={fontSize}
                            onChange={(e) => setFontSize(parseFloat(e.target.value))}
                        />
                        <div className="toolbox-value">{(fontSize * 100).toFixed(0)}%</div>
                    </div>
                </div>
            );
        };

        // Mount toolbox
        document.addEventListener('DOMContentLoaded', () => {
            const toolboxContainer = document.createElement('div');
            document.body.appendChild(toolboxContainer);
            
            const root = ReactDOM.createRoot(toolboxContainer);
            const interval = setInterval(() => {
                root.render(<window.FontSizeToolbox />);
            }, 100);
        });
    </script>

    <!-- Theme Tweaks Panel -->
    <script type="text/babel">
        const THEME_PALETTES = [
            { name: 'Terracotta',     ink:'#3d2415', body:'#5d4425', accent:'#c17a4a', bg:'#f5ede0', surface:'#f5f0e6', border:'#e8ddd0', muted:'#9c7a5a', gradEnd:'#6b3a1f', heading:'#55311C', highlight:'#E82608' },

            { name: 'Adobe Brick',   ink:'#391f16', body:'#5b3a2a', accent:'#a8552e', bg:'#f5e9dd', surface:'#f4ebde', border:'#e6d3bf', muted:'#997459', gradEnd:'#63301a', heading:'#40241a', highlight:'#c1451f' },
            { name: 'Toasted Honey', ink:'#3d2b15', body:'#5f4826', accent:'#c9903f', bg:'#f8f0e0', surface:'#f6f1e3', border:'#ecdec2', muted:'#a68a55', gradEnd:'#6b4419', heading:'#463314', highlight:'#d97b1e' },
            { name: 'Deep Umber',    ink:'#2e1c12', body:'#4d3620', accent:'#a96b3a', bg:'#f2e8da', surface:'#f1eadd', border:'#e3d3bd', muted:'#8f7050', gradEnd:'#4d2f16', heading:'#331f13', highlight:'#b8511e' },
            { name: 'Warm Sand',     ink:'#2e1c12', body:'#4d3620', accent:'#a96b3a', bg:'#eee1d0', surface:'#ece0ce', border:'#ddcbb0', muted:'#a3835c', gradEnd:'#4d2f16', heading:'#331f13', highlight:'#b8511e' },
            { name: 'Toasted Sand',  ink:'#2e1c12', body:'#4d3620', accent:'#a96b3a', bg:'#e9dac5', surface:'#e7d9c3', border:'#d6c2a2', muted:'#9c7a52', gradEnd:'#4d2f16', heading:'#331f13', highlight:'#b8511e' },
            { name: 'Spiced Clay',   ink:'#2e1c12', body:'#4d3620', accent:'#a96b3a', bg:'#e4d3ba', surface:'#e2d2b8', border:'#cfb994', muted:'#967350', gradEnd:'#4d2f16', heading:'#331f13', highlight:'#b8511e' },
            { name: 'Umber Clay',    ink:'#2e1c12', body:'#4d3620', accent:'#a96b3a', bg:'#dfccaf', surface:'#ddcbad', border:'#c8b086', muted:'#8f6c4a', gradEnd:'#4d2f16', heading:'#331f13', highlight:'#b8511e' },
            { name: 'Roasted Clay',  ink:'#2e1c12', body:'#4d3620', accent:'#a96b3a', bg:'#dac5a4', surface:'#d8c4a2', border:'#c1a97a', muted:'#886545', gradEnd:'#4d2f16', heading:'#331f13', highlight:'#b8511e' },
            { name: 'Midnight Terracotta', dark:true, ink:'#f3e8da', deep:'#2e1c12', body:'#d9c3a8', accent:'#e08a4f', bg:'#211510', surface:'#2c1d15', border:'#40291d', muted:'#b08a63', gradEnd:'#6b3a1f', heading:'#f6ede0', highlight:'#e77a3d' },
        ];
        const THEME_STORAGE_KEY = 'enchantedOutingsTheme';
        const BODY_COPY_STORAGE_KEY = 'enchantedOutingsBodyCopy';
        const BODY_COPY_DEFAULTS = { color: 'ink', weight: 400, size: 15, lineHeight: 1.7 };
        const BODY_COPY_COLOR_OPTIONS = [
            { label: 'Current',   value: 'theme' },
            { label: 'Darker',    value: 'darker' },
            { label: 'Deep Ink',  value: 'ink' },
        ];

        const HERO_STORAGE_KEY = 'enchantedOutingsHero';
        const HERO_DEFAULTS = { titleFont: 'sans', titleSpacing: -0.5, subtitleColor: 'highlight', subtitleStyle: 'normal' };
        const HERO_TITLE_FONT_OPTIONS = [
            { label: 'Sans',      value: 'sans' },
            { label: 'Playfair',  value: 'playfair' },
            { label: 'Cormorant', value: 'cormorant' },
            { label: 'Marcellus', value: 'marcellus' },
            { label: 'Cinzel',    value: 'cinzel' },
            { label: 'DM Serif',  value: 'dmserif' },
            { label: 'Baskerville', value: 'baskerville' },
        ];
        const HERO_TITLE_FONT_STACKS = {
            sans: 'var(--font-body)',
            playfair: "'Playfair Display', Georgia, serif",
            cormorant: "'Cormorant Garamond', Georgia, serif",
            marcellus: "'Marcellus', Georgia, serif",
            cinzel: "'Cinzel', Georgia, serif",
            dmserif: "'DM Serif Display', Georgia, serif",
            baskerville: "'Libre Baskerville', Georgia, serif",
        };
        const HERO_SUBTITLE_COLOR_OPTIONS = [
            { label: 'Highlight', value: 'highlight' },
            { label: 'Accent',    value: 'accent' },
            { label: 'Deep Ink',  value: 'ink' },
        ];
        const HERO_SUBTITLE_STYLE_OPTIONS = [
            { label: 'Normal',    value: 'normal' },
            { label: 'Tracked Caps', value: 'caps' },
        ];

        function resolveHeroSubtitleColor(key) {
            if (key === 'accent') return 'var(--theme-accent)';
            if (key === 'ink') return 'var(--theme-ink)';
            return 'var(--theme-highlight)';
        }

        function applyHero(hero) {
            const root = document.documentElement.style;
            root.setProperty('--hero-title-font', HERO_TITLE_FONT_STACKS[hero.titleFont] || HERO_TITLE_FONT_STACKS.sans);
            root.setProperty('--hero-title-spacing', hero.titleSpacing + 'px');
            root.setProperty('--hero-subtitle-color', resolveHeroSubtitleColor(hero.subtitleColor));
            root.setProperty('--hero-subtitle-transform', hero.subtitleStyle === 'caps' ? 'uppercase' : 'none');
            root.setProperty('--hero-subtitle-tracking', hero.subtitleStyle === 'caps' ? '0.12em' : '0em');
        }

        function resolveBodyCopyColor(key) {
            if (key === 'ink') return 'var(--theme-ink)';
            if (key === 'darker') return 'color-mix(in srgb, var(--theme-body) 55%, var(--theme-ink) 45%)';
            return 'var(--theme-body)';
        }

        function applyBodyCopy(bc) {
            const root = document.documentElement.style;
            root.setProperty('--body-copy-color', resolveBodyCopyColor(bc.color));
            root.setProperty('--body-copy-weight', bc.weight);
            root.setProperty('--body-copy-size', bc.size + 'px');
            root.setProperty('--body-copy-lh', bc.lineHeight);
        }

        function applyTheme(theme) {
            const root = document.documentElement.style;
            root.setProperty('--theme-ink', theme.ink);
            root.setProperty('--theme-deep', theme.deep || theme.ink);
            root.setProperty('--theme-body', theme.body);
            root.setProperty('--theme-accent', theme.accent);
            root.setProperty('--theme-bg', theme.bg);
            root.setProperty('--theme-surface', theme.surface);
            root.setProperty('--theme-border', theme.border);
            root.setProperty('--theme-muted', theme.muted);
            root.setProperty('--theme-grad-end', theme.gradEnd);
            root.setProperty('--theme-heading', theme.heading);
            root.setProperty('--theme-highlight', theme.highlight);
        }

        window.ThemeToolbox = function() {
            const [themeName, setThemeName] = React.useState(() => {
                try { return localStorage.getItem(THEME_STORAGE_KEY) || 'Terracotta'; }
                catch (e) { return 'Terracotta'; }
            });
            const [bodyCopy, setBodyCopyState] = React.useState(() => {
                try {
                    const saved = JSON.parse(localStorage.getItem(BODY_COPY_STORAGE_KEY));
                    return saved ? { ...BODY_COPY_DEFAULTS, ...saved } : { ...BODY_COPY_DEFAULTS };
                } catch (e) { return { ...BODY_COPY_DEFAULTS }; }
            });
            const setBodyCopy = (key, value) => setBodyCopyState(prev => ({ ...prev, [key]: value }));

            const [hero, setHeroState] = React.useState(() => {
                try {
                    const saved = JSON.parse(localStorage.getItem(HERO_STORAGE_KEY));
                    return saved ? { ...HERO_DEFAULTS, ...saved } : { ...HERO_DEFAULTS };
                } catch (e) { return { ...HERO_DEFAULTS }; }
            });
            const setHero = (key, value) => setHeroState(prev => ({ ...prev, [key]: value }));

            React.useEffect(() => {
                applyHero(hero);
                try { localStorage.setItem(HERO_STORAGE_KEY, JSON.stringify(hero)); } catch (e) {}
            }, [hero]);

            React.useEffect(() => {
                const theme = THEME_PALETTES.find(t => t.name === themeName) || THEME_PALETTES[0];
                applyTheme(theme);
                try { localStorage.setItem(THEME_STORAGE_KEY, themeName); } catch (e) {}
            }, [themeName]);

            React.useEffect(() => {
                applyBodyCopy(bodyCopy);
                try { localStorage.setItem(BODY_COPY_STORAGE_KEY, JSON.stringify(bodyCopy)); } catch (e) {}
            }, [bodyCopy]);

            return (
                <TweaksPanel title="Tweaks">
                    <TweakSection label="Theme" />
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 8 }}>
                        {THEME_PALETTES.map(t => (
                            <button
                                key={t.name}
                                onClick={() => setThemeName(t.name)}
                                style={{
                                    display: 'flex', flexDirection: 'column', alignItems: 'flex-start', gap: 6,
                                    padding: '8px 10px', borderRadius: 8, cursor: 'pointer',
                                    border: themeName === t.name ? `2px solid ${t.accent}` : '1px solid rgba(0,0,0,0.12)',
                                    background: t.bg,
                                    boxShadow: themeName === t.name ? '0 2px 6px rgba(0,0,0,0.15)' : 'none',
                                }}
                            >
                                <div style={{ display: 'flex', gap: 4 }}>
                                    <span style={{ width: 14, height: 14, borderRadius: '50%', background: t.ink }} />
                                    <span style={{ width: 14, height: 14, borderRadius: '50%', background: t.accent }} />
                                    <span style={{ width: 14, height: 14, borderRadius: '50%', background: t.body }} />
                                </div>
                                <span style={{ fontSize: 11, fontWeight: 600, color: t.ink }}>{t.name}</span>
                            </button>
                        ))}
                    </div>
                    <TweakSection label="Body Text (Detail Pages)" />
                    <TweakRadio label="Text Color"
                                value={bodyCopy.color}
                                options={BODY_COPY_COLOR_OPTIONS}
                                onChange={(v) => setBodyCopy('color', v)} />
                    <TweakSlider label="Weight" value={bodyCopy.weight} min={400} max={600} step={100}
                                 onChange={(v) => setBodyCopy('weight', v)} />
                    <TweakSlider label="Size" value={bodyCopy.size} min={14} max={18} step={1} unit="px"
                                 onChange={(v) => setBodyCopy('size', v)} />
                    <TweakSlider label="Line Height" value={bodyCopy.lineHeight} min={1.5} max={1.85} step={0.05}
                                 onChange={(v) => setBodyCopy('lineHeight', v)} />
                    <TweakSection label="Hero Title & Subtitle" />
                    <TweakRadio label="Title Font"
                                value={hero.titleFont}
                                options={HERO_TITLE_FONT_OPTIONS}
                                onChange={(v) => setHero('titleFont', v)} />
                    <TweakSlider label="Title Spacing" value={hero.titleSpacing} min={-2} max={4} step={0.5} unit="px"
                                 onChange={(v) => setHero('titleSpacing', v)} />
                    <TweakRadio label="Subtitle Color"
                                value={hero.subtitleColor}
                                options={HERO_SUBTITLE_COLOR_OPTIONS}
                                onChange={(v) => setHero('subtitleColor', v)} />
                    <TweakRadio label="Subtitle Style"
                                value={hero.subtitleStyle}
                                options={HERO_SUBTITLE_STYLE_OPTIONS}
                                onChange={(v) => setHero('subtitleStyle', v)} />
                </TweaksPanel>
            );
        };

        (function mountThemeToolbox() {
            // Apply saved/default theme immediately, even before the panel mounts.
            const saved = (() => { try { return localStorage.getItem(THEME_STORAGE_KEY); } catch (e) { return null; } })();
            applyTheme(THEME_PALETTES.find(t => t.name === saved) || THEME_PALETTES[0]);

            const savedBodyCopy = (() => {
                try {
                    const s = JSON.parse(localStorage.getItem(BODY_COPY_STORAGE_KEY));
                    return s ? { ...BODY_COPY_DEFAULTS, ...s } : { ...BODY_COPY_DEFAULTS };
                } catch (e) { return { ...BODY_COPY_DEFAULTS }; }
            })();
            applyBodyCopy(savedBodyCopy);

            const savedHero = (() => {
                try {
                    const s = JSON.parse(localStorage.getItem(HERO_STORAGE_KEY));
                    return s ? { ...HERO_DEFAULTS, ...s } : { ...HERO_DEFAULTS };
                } catch (e) { return { ...HERO_DEFAULTS }; }
            })();
            applyHero(savedHero);

            const themeContainer = document.createElement('div');
            document.body.appendChild(themeContainer);
            const root = ReactDOM.createRoot(themeContainer);
            root.render(<window.ThemeToolbox />);
        })();
    </script>
